name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '31 7 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        service: [api, workers, web, admin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercased IMAGE_NAME
        run: |
          echo "IMAGE_NAME=$(echo \"${GITHUB_REPOSITORY}\" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        shell: bash

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Dockerfile for service
        run: |
          case "${{ matrix.service }}" in
            api) echo "DOCKERFILE=docker/Dockerfile.api" >> $GITHUB_ENV ;;
            workers) echo "DOCKERFILE=docker/Dockerfile.workers" >> $GITHUB_ENV ;;
            web) echo "DOCKERFILE=docker/Dockerfile.web" >> $GITHUB_ENV ;;
            admin) echo "DOCKERFILE=docker/Dockerfile.admin" >> $GITHUB_ENV ;;
          esac

      - name: Extract Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}

      - name: Compute ALL_TAGS deterministically
        run: |
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}"
          tags="${base}:${short_sha}"

          # add latest when building on main branch
          if [ "${GITHUB_REF#refs/heads/}" = "main" ]; then
            tags=",${base}:latest"
            tags="${base}:${short_sha},${base}:latest"
          fi

          # if this is a tag push, also add the tag name
          case "${GITHUB_REF}" in
            refs/tags/*)
              tagname="${GITHUB_REF#refs/tags/}"
              tags="${tags},${base}:${tagname}"
              ;;
          esac

          # sanitize tags: remove quotes and leading commas
          tags=$(printf "%s" "$tags" | tr -d '"' | tr -d "'" | sed 's/^,*//')
          # write to env
          echo "ALL_TAGS=${tags}" >> $GITHUB_ENV
        shell: bash

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.ALL_TAGS }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ env.ALL_TAGS }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
