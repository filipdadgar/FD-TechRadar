services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techradar
      POSTGRES_USER: techradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techradar -d techradar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: techradar
      POSTGRES_USER: techradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.workers
    environment:
      DOTNET_ENVIRONMENT: Production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: techradar
      POSTGRES_USER: techradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GITHUB_PAT: ${GITHUB_PAT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENTS_SCHEDULE_CRON: ${AGENTS_SCHEDULE_CRON:-0 3 * * *}
      AGENTS_MAX_PROPOSALS_PER_RUN: ${AGENTS_MAX_PROPOSALS_PER_RUN:-50}
      AGENTS_STALE_PROPOSAL_THRESHOLD_DAYS: ${AGENTS_STALE_PROPOSAL_THRESHOLD_DAYS:-7}
      AGENTS_ANTHROPIC_MODEL: ${AGENTS_ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped

  frontend-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      frontend-web:
        condition: service_started
      frontend-admin:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
